<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presidente por um Dia — Gabinete Econômico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;800&family=Special+Elite&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1B2A41; --ink-2:#233a56; --parchment:#EFE6D3; --gold:#B8933F;
  --crisis:#8C2F2F; --growth:#3F6B4F; --charcoal:#2A241C; --line:#cdbf98;
  --divida-c:#4A6FA5; --desig-c:#7A4C7A; --inflacao-c:#2A241C; --swan:#5C3A21; --advisor:#1B2A41;
}
*{box-sizing:border-box;}
body{ margin:0; min-height:100vh; background:radial-gradient(ellipse at top, var(--ink-2), var(--ink) 70%);
  font-family:'Bitter', serif; color:var(--parchment); display:flex; flex-direction:column;
  align-items:center; padding:24px 14px 0; }
.masthead{ width:100%; max-width:660px; text-align:center; border-bottom:3px double var(--gold);
  padding-bottom:12px; margin-bottom:18px; }
.masthead h1{ font-weight:800; font-size:1.6rem; letter-spacing:1px; margin:0 0 4px; text-transform:uppercase; }
.masthead .sub{ font-family:'JetBrains Mono', monospace; font-size:0.72rem; letter-spacing:2px;
  color:var(--gold); text-transform:uppercase; }
.masthead-row{ display:flex; align-items:center; justify-content:center; gap:10px; position:relative; }
.mute-btn{ position:absolute; right:0; top:-2px; background:transparent; border:1px solid var(--gold);
  color:var(--gold); border-radius:50%; width:30px; height:30px; cursor:pointer; font-size:0.85rem;
  display:flex; align-items:center; justify-content:center; transition:background .12s ease; }
.mute-btn:hover{ background:rgba(184,147,63,0.15); }
.diff-badge{ position:absolute; left:0; top:-2px; font-family:'JetBrains Mono', monospace; font-size:0.62rem;
  border:1px solid var(--gold); color:var(--gold); border-radius:12px; padding:5px 10px; letter-spacing:1px;
  text-transform:uppercase; display:none; }
.chart-wrap{ margin-bottom:16px; }
.chart-legend{ display:flex; flex-wrap:wrap; gap:8px 14px; margin-top:8px; font-family:'JetBrains Mono', monospace; font-size:0.66rem; }
.chart-legend span{ display:flex; align-items:center; gap:5px; }
.chart-legend i{ width:10px; height:10px; border-radius:2px; display:inline-block; }
.share-feedback{ font-family:'JetBrains Mono', monospace; font-size:0.7rem; color:var(--growth); text-align:center; margin-top:6px; min-height:1em; }
.stage{ width:100%; max-width:660px; flex:1; }
.card{ background:var(--parchment); color:var(--charcoal); border-radius:4px; padding:26px 22px;
  box-shadow:0 12px 30px rgba(0,0,0,0.35); position:relative;
  background-image:repeating-linear-gradient(var(--parchment) 0 27px, var(--line) 27px 28px);
  background-size:100% 28px; opacity:0; animation:fadeSlideIn .5s ease forwards; }
@keyframes fadeSlideIn{ 0%{ opacity:0; transform:translateY(14px); } 100%{ opacity:1; transform:translateY(0); } }
.card::before{ content:""; position:absolute; inset:8px; border:1px solid rgba(42,36,28,0.15); pointer-events:none; }
.eyebrow{ font-family:'JetBrains Mono', monospace; font-size:0.7rem; letter-spacing:2px; color:var(--crisis);
  text-transform:uppercase; margin-bottom:6px; display:block; }
.card h2{ font-weight:800; font-size:1.25rem; margin:0 0 12px; }
.briefing{ font-family:'Special Elite', monospace; font-size:0.92rem; line-height:1.7; margin:0 0 18px; }
.opt{ display:block; width:100%; text-align:left; background:var(--ink); color:var(--parchment);
  border:2px solid var(--gold); border-radius:3px; padding:12px 16px 10px; margin-bottom:10px; cursor:pointer;

.opt:hover{ background:var(--ink-2); transform:translateX(3px); }
.opt:active{ transform:scale(0.98); }
.opt .opt-name{ font-family:'Bitter',serif; font-weight:600; font-size:0.95rem; display:block; }
.opt .opt-tag{ font-family:'JetBrains Mono', monospace; font-size:0.68rem; color:var(--gold); letter-spacing:0.3px; display:block; margin-top:4px; }
.opt.disabled{ opacity:0.55; cursor:not-allowed; background:#3a3a3a; border-color:#777; }
.opt.disabled:hover{ transform:none; background:#3a3a3a; }
.opt.disabled .opt-tag{ color:#c98a8a; }
.opt-warn{ font-family:'JetBrains Mono', monospace; font-size:0.62rem; color:#e2a1a1; display:block; margin-top:5px; letter-spacing:0.2px; }
.btn.primary{ display:block; width:100%; text-align:center; background:var(--gold); color:var(--charcoal);
  border:2px solid var(--charcoal); border-radius:3px; padding:12px 16px; font-weight:800; letter-spacing:0.5px;

.btn.primary:hover{ background:#c9a44f; }
.btn.ghost{ display:block; width:100%; text-align:center; background:transparent; color:var(--charcoal);
  border:2px dashed rgba(42,36,28,0.4); border-radius:3px; padding:10px 16px; font-weight:600; letter-spacing:0.3px;

.btn.ghost:hover{ background:rgba(42,36,28,0.06); }
.btn.primary:disabled, .btn.ghost:disabled{ opacity:0.6; cursor:not-allowed; }
.diff-pick{ display:flex; gap:12px; margin-top:6px; }
.diff-opt{ flex:1; text-align:left; background:var(--ink); color:var(--parchment); border:2px solid var(--gold);
  border-radius:3px; padding:14px 14px 12px; cursor:pointer; transition:transform .12s ease, background .12s ease; }
.diff-opt:hover{ background:var(--ink-2); transform:translateY(-2px); }
.diff-opt b{ display:block; font-size:0.95rem; margin-bottom:4px; }
.diff-opt span{ font-family:'JetBrains Mono', monospace; font-size:0.68rem; color:var(--gold); line-height:1.5; display:block; }
.diff-opt.selected{ background:var(--ink-2); box-shadow:0 0 0 2px var(--gold) inset; }
.stamp-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.55); display:flex; align-items:center;

.stamp-overlay.show{ opacity:1; pointer-events:auto; }
.stamp{ border:6px solid var(--crisis); color:var(--crisis); font-weight:800; text-transform:uppercase;
  font-size:1.4rem; padding:14px 26px; border-radius:8px; transform:rotate(-8deg) scale(2); opacity:0;

.stamp-overlay.show .stamp{ animation:thud .38s ease-out forwards; }
@keyframes thud{ 0%{ transform:rotate(-8deg) scale(2.4); opacity:0; } 60%{ transform:rotate(-8deg) scale(0.92); opacity:1; } 100%{ transform:rotate(-8deg) scale(1); opacity:1; } }
.delta-row{ display:flex; gap:8px; flex-wrap:wrap; margin:14px 0 16px; font-family:'JetBrains Mono', monospace; font-size:0.75rem; }
.delta{ padding:4px 8px; border-radius:3px; background:rgba(42,36,28,0.07); }
.delta.up{ color:var(--growth); font-weight:600; }
.delta.down{ color:var(--crisis); font-weight:600; }
.history-note{ border-left:3px solid var(--gold); padding:10px 12px; background:rgba(184,147,63,0.12);
  font-size:0.85rem; line-height:1.6; margin-bottom:18px; }
.history-note b{ color:var(--crisis); }
.cross-note{ border-left:3px solid var(--divida-c); padding:10px 12px; background:rgba(74,111,165,0.12);
  font-size:0.82rem; line-height:1.6; margin-bottom:14px; }
.cross-note b{ color:var(--divida-c); }
.progress{ font-family:'JetBrains Mono', monospace; font-size:0.68rem; color:var(--charcoal); opacity:0.6; margin-bottom:10px; }
.progress-dots{ display:flex; gap:5px; margin-bottom:14px; }
.prog-dot{ width:7px; height:7px; border-radius:50%; background:rgba(42,36,28,0.18); }
.prog-dot.prog-done{ background:var(--growth); }
.prog-dot.prog-current{ background:var(--crisis); transform:scale(1.3); }
.hidden-hint{ font-family:'JetBrains Mono', monospace; font-size:0.65rem; color:var(--charcoal); opacity:0.55; margin:-6px 0 14px; font-style:italic; }
.ticker-wrap{ width:100%; max-width:660px; overflow:hidden; background:var(--ink-2); border-top:1px solid var(--gold);
  border-bottom:1px solid var(--gold); margin-top:18px; padding:8px 0; }
.ticker{ display:flex; gap:32px; white-space:nowrap; animation:scroll 22s linear infinite;
  font-family:'JetBrains Mono', monospace; font-size:0.76rem; }
@keyframes scroll{ 0%{ transform:translateX(0); } 100%{ transform:translateX(-50%); } }
.tick-item{ color:var(--parchment); opacity:0.9; }
.tick-item .lbl{ color:var(--gold); margin-right:4px; }
.tick-item.hidden-metric{ opacity:0.4; font-style:italic; }
footer.spacer{ height:14px; }
.final-title{ font-weight:800; font-size:1.45rem; color:var(--crisis); text-align:center; margin:4px 0 2px; }
.final-sub{ font-family:'JetBrains Mono', monospace; font-size:0.72rem; text-align:center; color:var(--charcoal);
  opacity:0.75; letter-spacing:1px; text-transform:uppercase; margin-bottom:14px; }
.final-desc{ font-family:'Special Elite', monospace; font-size:0.88rem; line-height:1.7; margin-bottom:18px; }
.bar-row{ margin-bottom:10px; }
.bar-label{ display:flex; justify-content:space-between; font-family:'JetBrains Mono', monospace; font-size:0.72rem; margin-bottom:4px; }
.bar-track{ height:9px; background:rgba(42,36,28,0.15); border-radius:5px; overflow:hidden; }
.bar-fill{ height:100%; border-radius:5px; }
.hist-list{ list-style:none; margin:0 0 18px; padding:0; }
.hist-list li{ font-size:0.85rem; padding:8px 0; border-bottom:1px dashed rgba(42,36,28,0.2); display:flex; flex-direction:column; gap:2px; }
.hist-list li:last-child{ border-bottom:none; }
.hist-list .h-crisis{ font-family:'JetBrains Mono', monospace; font-size:0.66rem; color:var(--crisis); text-transform:uppercase; letter-spacing:1px; }
.hist-list .h-choice{ font-weight:600; }
.hist-list .h-swan{ font-family:'JetBrains Mono', monospace; font-size:0.66rem; color:var(--swan); text-transform:uppercase; letter-spacing:1px; }
.swan-eyebrow{ color:var(--swan); }
.swan-icon{ display:block; margin-bottom:6px; color:var(--swan); }
.advisor-wrap{ position:absolute; top:-18px; right:0; left:0; z-index:5; display:flex; flex-direction:column;
  align-items:flex-end; opacity:0; transform:translateY(6px) scale(0.9); animation:advisorIn .35s ease forwards;
  max-width:100%; padding:0 10px; pointer-events:none; }
.advisor-wrap .advisor-bubble{ pointer-events:auto; max-width:min(280px, 78vw); }
@keyframes advisorIn{ 0%{ opacity:0; transform:translateY(6px) scale(0.9); } 100%{ opacity:1; transform:translateY(0) scale(1); } }
.advisor-bubble{ background:var(--advisor); color:var(--parchment); border:2px solid var(--gold);
  border-radius:10px 10px 2px 10px; padding:9px 12px; font-size:0.76rem; line-height:1.45;
  box-shadow:0 6px 14px rgba(0,0,0,0.3); position:relative; }
.advisor-name{ font-family:'JetBrains Mono', monospace; font-size:0.6rem; color:var(--gold); text-transform:uppercase;
  letter-spacing:1px; display:block; margin-bottom:3px; }
.advisor-close{ position:absolute; top:-9px; right:-9px; background:var(--crisis); color:#fff; border:none;
  border-radius:50%; width:20px; height:20px; font-size:0.7rem; line-height:1; cursor:pointer; }
.mp-input{ width:100%; padding:10px 12px; font-family:'JetBrains Mono', monospace; font-size:0.85rem;
  border:2px solid rgba(42,36,28,0.3); border-radius:3px; background:#fbf7ec; color:var(--charcoal); margin-bottom:10px; }
.mp-input.code{ text-transform:uppercase; letter-spacing:3px; text-align:center; }
.mp-label{ font-family:'JetBrains Mono', monospace; font-size:0.68rem; text-transform:uppercase; letter-spacing:1px; opacity:0.65; display:block; margin-bottom:4px; }
.room-code-display{ text-align:center; font-family:'JetBrains Mono', monospace; font-size:1.8rem; letter-spacing:8px;
  font-weight:600; color:var(--crisis); border:2px dashed var(--crisis); border-radius:6px; padding:14px 8px; margin:12px 0 16px; }
.player-list{ list-style:none; margin:0 0 16px; padding:0; }
.player-list li{ font-size:0.85rem; padding:7px 10px; margin-bottom:6px; border-radius:3px; background:rgba(42,36,28,0.06);
  display:flex; justify-content:space-between; align-items:center; }
.player-list .p-host{ font-family:'JetBrains Mono', monospace; font-size:0.6rem; color:var(--gold); background:var(--ink); padding:2px 6px; border-radius:3px; }
.vote-status{ font-family:'JetBrains Mono', monospace; font-size:0.72rem; text-align:center; color:var(--charcoal); opacity:0.7; margin:10px 0; }
.tally-row{ margin-bottom:8px; }
.tally-label{ display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:3px; font-weight:600; }
.tally-track{ height:8px; background:rgba(42,36,28,0.12); border-radius:4px; overflow:hidden; }
.tally-fill{ height:100%; background:var(--divida-c); border-radius:4px; }
.mp-mode-tag{ font-family:'JetBrains Mono', monospace; font-size:0.65rem; color:var(--divida-c); letter-spacing:1px;
  text-transform:uppercase; display:block; margin-bottom:6px; }
.mp-error{ font-family:'JetBrains Mono', monospace; font-size:0.7rem; color:var(--crisis); text-align:center; margin:8px 0 0; min-height:1em; }
.resume-banner{ border-left:3px solid var(--growth); padding:10px 12px; background:rgba(63,107,79,0.12);
  font-size:0.8rem; line-height:1.5; margin-bottom:14px; }
.mp-conn-banner{ position:fixed; left:50%; bottom:14px; transform:translateX(-50%); background:var(--crisis);
  color:#fff; font-family:'JetBrains Mono', monospace; font-size:0.72rem; padding:8px 16px; border-radius:20px;
  box-shadow:0 4px 14px rgba(0,0,0,0.35); z-index:60; display:none; max-width:90vw; text-align:center; }
.mp-conn-banner.show{ display:block; }
@media (prefers-reduced-motion: reduce){
  .ticker{ animation:none; } .card{ animation:none; opacity:1; }
  .stamp-overlay.show .stamp{ animation:none; opacity:1; transform:rotate(-8deg) scale(1); }
  .advisor-wrap{ animation:none; opacity:1; transform:none; }
}
</style>
</head>
<body>
<div class="masthead">
  <div class="masthead-row">
    <span class="diff-badge" id="diffBadge"></span>
    <h1>Gabinete Econômico</h1>
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="Ativar/desativar som">🔊</button>
  </div>
  <div class="sub">Presidente por um dia · 10 crises · edição complexa</div>
</div>
<div class="stage" id="stage"></div>
<div class="ticker-wrap" id="tickerWrap" style="display:none">
  <div class="ticker" id="ticker"></div>
</div>
<footer class="spacer"></footer>
<div class="mp-conn-banner" id="mpConnBanner">Conexão instável — tentando reconectar…</div>
<div class="stamp-overlay" id="stampOverlay">
  <div class="stamp" id="stampText">DECIDIDO</div>
</div>

<script>
/* ---------------------------------------------------------
   ÁUDIO — efeitos sonoros sintetizados (sem arquivos externos)
--------------------------------------------------------- */
let audioCtx = null;
let soundEnabled = true;
function toggleMute(){
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('muteBtn');
  if(btn) btn.textContent = soundEnabled ? '🔊' : '🔇';
  if(soundEnabled) beep({freq:600, duration:0.06, type:'sine', gain:0.05});
}
function getCtx(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ audioCtx = null; }
  }
  return audioCtx;
}
function beep({freq=440, duration=0.12, type='sine', gain=0.08, delay=0}){
  if(!soundEnabled) return;
  const ctx = getCtx();
  if(!ctx) return;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.value = gain;
  osc.connect(g);
  g.connect(ctx.destination);
  const t0 = ctx.currentTime + delay;
  g.gain.setValueAtTime(gain, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.start(t0);
  osc.stop(t0 + duration + 0.02);
}
function playClickSound(){
  beep({freq:520, duration:0.08, type:'square', gain:0.05});
  beep({freq:780, duration:0.06, type:'square', gain:0.03, delay:0.05});
}
function playStampSound(){
  beep({freq:120, duration:0.18, type:'sawtooth', gain:0.12});
  beep({freq:90, duration:0.22, type:'square', gain:0.08, delay:0.03});
}
function playEndingSound(good){
  if(good){
    beep({freq:523, duration:0.14, type:'triangle', gain:0.07});
    beep({freq:659, duration:0.14, type:'triangle', gain:0.07, delay:0.12});
    beep({freq:784, duration:0.22, type:'triangle', gain:0.08, delay:0.24});
  } else {
    beep({freq:200, duration:0.22, type:'sawtooth', gain:0.09});
    beep({freq:150, duration:0.3, type:'sawtooth', gain:0.09, delay:0.18});
  }
}
function playSwanSound(){
  beep({freq:340, duration:0.12, type:'sawtooth', gain:0.08});
  beep({freq:260, duration:0.16, type:'sawtooth', gain:0.08, delay:0.1});
  beep({freq:180, duration:0.22, type:'sawtooth', gain:0.08, delay:0.22});
}
function playAdvisorSound(){
  beep({freq:700, duration:0.05, type:'sine', gain:0.04});
  beep({freq:900, duration:0.05, type:'sine', gain:0.04, delay:0.07});
}

/* ---------------------------------------------------------
   ESTADO
--------------------------------------------------------- */
const baseState = { pib:100, desemprego:12, inflacao:5, confianca:50, divida:60, desigualdade:50 };
let state = {...baseState};
let history = [];
let timeline = [];
let flags = {};
let difficulty = 'facil';
const HIDDEN_METRICS = ['inflacao','divida','desigualdade'];

/* ---------------------------------------------------------
   MULTIPLAYER — "Gabinete Coletivo"
--------------------------------------------------------- */
let mpRoomCode = null;
let mpPlayerName = null;
let mpIsHost = false;
let mpMeta = null;
let mpState = null;
let mpMyVoteRound = null;
let mpPollTimer = null;
let mpConsecutiveFails = 0;
const MP_FAIL_THRESHOLD = 2;
function mpShowConnError(show){
  const el = document.getElementById('mpConnBanner');
  if(el) el.classList.toggle('show', !!show);
}
const MP_ROUND_TIMEOUT_MS = 25000;
function applyDeltasToObj(obj, deltas){
  obj.pib = clamp(obj.pib + (deltas.pib || 0), -50, 300);
  obj.desemprego = clamp(obj.desemprego + (deltas.desemprego||0), 0, 100);
  obj.inflacao += deltas.inflacao || 0;
  obj.confianca = clamp(obj.confianca + (deltas.confianca||0), 0, 100);
  obj.divida = clamp(obj.divida + (deltas.divida||0), 0, 300);
  obj.desigualdade = clamp(obj.desigualdade + (deltas.desigualdade||0), 0, 100);
}
async function storGet(key){
  try{
    const r = await fetch(`/api/kv/${encodeURIComponent(key)}`);
    if(!r.ok) return null; // 404 = chave não existe
    const data = await r.json();
    return data.value; // já vem como objeto puro, sem precisar de JSON.parse
  }catch(e){ return null; }
}
async function storSet(key, value){
  try{
    const r = await fetch(`/api/kv/${encodeURIComponent(key)}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ value })
    });
    return r.ok ? await r.json() : null;
  }catch(e){ return null; }
}
async function storList(prefix){
  try{
    const r = await fetch(`/api/kv?prefix=${encodeURIComponent(prefix)}`);
    if(!r.ok) return [];
    const data = await r.json();
    return data.keys || [];
  }catch(e){ return []; }
}
async function storDelete(key){
  try{ await fetch(`/api/kv/${encodeURIComponent(key)}`, { method:'DELETE' }); }
  catch(e){ /* best-effort */ }
}
function roomMetaKey(code){ return `room:${code}:meta`; }
function roomStateKey(code){ return `room:${code}:state`; }
function roomVoteKey(code, roundIdx, name){ return `room:${code}:vote:${roundIdx}:${name}`; }
function roomVotePrefix(code, roundIdx){ return `room:${code}:vote:${roundIdx}:`; }
function roomPlayerKey(code, name){ return `room:${code}:player:${name}`; }
function roomPlayerPrefix(code){ return `room:${code}:player:`; }
function mpGenCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0;i<5;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}
function mpStopPolling(){ if(mpPollTimer){ clearInterval(mpPollTimer); mpPollTimer = null; } }
async function mpGetPlayersFull(code){
  const keys = await storList(roomPlayerPrefix(code));
  const results = await Promise.all(keys.map(k => storGet(k)));
  const players = results.filter(p => p && p.name);
  players.sort((a,b) => (a.joinedAt||0) - (b.joinedAt||0));
  return players;
}
async function mpGetPlayers(code){
  const full = await mpGetPlayersFull(code);
  return full.map(p => p.name).sort((a,b) => a.localeCompare(b));
}
const MP_ROOM_TTL_MS = 24 * 60 * 60 * 1000;
async function mpCleanupOldRooms(){
  try{
    const metaKeys = await storList('room:');
    const staleMetaKeys = metaKeys.filter(k => k.endsWith(':meta')).slice(0, 25);
    for(const mk of staleMetaKeys){
      const meta = await storGet(mk);
      if(!meta || !meta.createdAt || (Date.now() - meta.createdAt) < MP_ROOM_TTL_MS) continue;
      const code = mk.split(':')[1];
      const relatedKeys = await storList(`room:${code}:`);
      for(const rk of relatedKeys){ await storDelete(rk); }
    }
  }catch(e){ /* limpeza é best-effort */ }
}

function mpSleep(ms){ return new Promise(r => setTimeout(r, ms)); }
// FIX BUG CRÍTICO + UX MOBILE: antes, se a escrita no storage falhasse uma
// única vez (comum em redes de celular, que oscilam o tempo todo), o jogador
// via um erro e tinha que clicar de novo manualmente — ou, na versão anterior
// a essa, nem via erro nenhum e ficava travado sem explicação. Agora, em vez
// de desistir na primeira falha, cada escrita/leitura crítica tenta de novo
// sozinha várias vezes, com pausas crescentes (backoff exponencial), somando
// quase 40 segundos de tentativas antes de qualquer coisa aparecer para o
// jogador. Isso cobre até quedas de sinal mais longas (elevador, túnel,
// trocar de wifi para dados móveis) sem incomodar ninguém — só nos casos bem
// extremos de rede caída por muito tempo é que aparece um aviso no final.
async function storSetRetry(key, value, attempts=10, baseDelayMs=400){
  for(let i=0; i<attempts; i++){
    const r = await storSet(key, value);
    if(r) return r;
    if(i < attempts-1) await mpSleep(Math.min(baseDelayMs * Math.pow(1.6, i), 6000));
  }
  return null;
}
async function storGetRetry(key, attempts=10, baseDelayMs=400){
  for(let i=0; i<attempts; i++){
    const r = await storGet(key);
    if(r) return r;
    if(i < attempts-1) await mpSleep(Math.min(baseDelayMs * Math.pow(1.6, i), 6000));
  }
  return null;
}
async function mpCreateRoom(){
  const name = document.getElementById('mpNameInput').value.trim();
  if(!name){ mpShowEntryError('Digite seu nome antes de criar a sala.'); return; }
  mpShowEntryError('');
  mpSetEntryBusy(true, 'Criando sala…');
  const busyTicker = setInterval(() => {
    const btn = document.getElementById('mpCreateBtn');
    if(btn && btn.disabled) btn.textContent = 'Ainda tentando conectar…';
  }, 3000);
  mpCleanupOldRooms();
  const code = mpGenCode();
  const meta = { hostName:name, difficulty:'facil', createdAt: Date.now() };
  const initialState = { phase:'lobby', current:0, econState:{...baseState}, flags:{}, history:[], timeline:[{...baseState}], roundStarted:0 };
  const player = { name, joinedAt: Date.now(), lastSeen: Date.now() };

  const rMeta = await storSetRetry(roomMetaKey(code), meta);
  const rPlayer = await storSetRetry(roomPlayerKey(code, name), player);
  const rState = await storSetRetry(roomStateKey(code), initialState);
  clearInterval(busyTicker);

  if(!rMeta || !rPlayer || !rState){
    mpSetEntryBusy(false);
    mpShowEntryError('A conexão está muito instável agora. Toque em "Criar sala nova" para tentar de novo.');
    return;
  }
  const confirm = await storGetRetry(roomMetaKey(code));
  if(!confirm){
    mpSetEntryBusy(false);
    mpShowEntryError('A conexão está muito instável agora. Toque em "Criar sala nova" para tentar de novo.');
    return;
  }
  mpPlayerName = name; mpRoomCode = code; mpIsHost = true;
  mpMeta = { ...meta, players:[name] };
  mpState = initialState;
  mpSetEntryBusy(false);
  mpEnterLobby();
}

let mpPollTick = 0;
let mpCachedPlayersFull = null;
async function mpPoll(){
  if(!mpRoomCode) return;
  try{
    mpPollTick++;
    const shouldFetchPlayers = !mpCachedPlayersFull || (mpPollTick % 2 === 1);
    const myRecord = await storGet(roomPlayerKey(mpRoomCode, mpPlayerName));
    await storSet(roomPlayerKey(mpRoomCode, mpPlayerName), {
      name: mpPlayerName, joinedAt: (myRecord && myRecord.joinedAt) || Date.now(), lastSeen: Date.now()
    });
    const [meta, st, playersFull] = await Promise.all([
      storGet(roomMetaKey(mpRoomCode)),
      storGet(roomStateKey(mpRoomCode)),
      shouldFetchPlayers ? mpGetPlayersFull(mpRoomCode) : Promise.resolve(mpCachedPlayersFull)
    ]);
    if(shouldFetchPlayers) mpCachedPlayersFull = playersFull;
    if(!meta || !st){
      mpConsecutiveFails++;
      if(mpConsecutiveFails >= MP_FAIL_THRESHOLD) mpShowConnError(true);
      return;
    }
    mpConsecutiveFails = 0;
    mpShowConnError(false);
    mpMeta = meta;
    mpMeta.players = playersFull.map(p => p.name).sort((a,b) => a.localeCompare(b));
    mpIsHost = (meta.hostName === mpPlayerName);
    mpState = st;
    const hostRecord = playersFull.find(p => p.name === meta.hostName);
    const hostStale = !hostRecord || (Date.now() - (hostRecord.lastSeen || 0)) > MP_HOST_TIMEOUT_MS;
    if(hostStale){
      const active = playersFull.filter(p => (Date.now() - (p.lastSeen || 0)) <= MP_HOST_TIMEOUT_MS);
      active.sort((a,b) => (a.joinedAt||0) - (b.joinedAt||0));
      const nextHost = active[0];
      if(nextHost && nextHost.name === mpPlayerName && meta.hostName !== mpPlayerName){
        mpMeta.hostName = mpPlayerName;
        mpIsHost = true;
        await storSet(roomMetaKey(mpRoomCode), { hostName: mpPlayerName, difficulty: meta.difficulty, createdAt: meta.createdAt });
      }
    }
    if(mpIsHost && mpState.phase === 'voting'){
      await mpHostCheckVotes();
    }
    switch(mpState.phase){
      case 'lobby': mpRenderLobby(); break;
      case 'voting': await mpRenderVoting(); break;
      case 'reveal': mpRenderReveal(); break;
      case 'swan_reveal': mpRenderSwanReveal(); break;
      case 'final': mpStopPolling(); mpFinishToSolo(); break;
      default: mpRenderLobby();
    }
  }catch(e){
    mpConsecutiveFails++;
    if(mpConsecutiveFails >= MP_FAIL_THRESHOLD) mpShowConnError(true);
  }
}

async function mpHostCheckVotes(){
  difficulty = mpMeta.difficulty;
  const s = scenarios[mpState.current];
  const voteKeys = await storList(roomVotePrefix(mpRoomCode, mpState.current));
  const voteResults = await Promise.all(voteKeys.map(k => storGet(k)));
  const votes = voteResults.filter(v => v !== null);
  const totalPlayers = mpMeta.players.length;
  const elapsed = Date.now() - (mpState.roundStarted || Date.now());
  if(votes.length < totalPlayers && elapsed < MP_ROUND_TIMEOUT_MS) return;
  const s2 = scenarios[mpState.current];
  const mods2 = getCrossMods(s2);
  const validIdx = s2.options.map((_,i) => i).filter(i => !(mods2[i] && mods2[i].disabled));
  const tally = new Array(s2.options.length).fill(0);
  votes.forEach(idx => { if(tally[idx] !== undefined) tally[idx]++; });
  let winner = 0, max = -1;
  if(votes.length > 0){
    tally.forEach((c,i) => { if(c > max){ max = c; winner = i; } });
  } else {
    const pool = validIdx.length > 0 ? validIdx : s2.options.map((_,i)=>i);
    winner = pool[Math.floor(Math.random()*pool.length)];
  }
  const mods = getCrossMods(s);
  const mod = mods[winner];
  const opt = s.options[winner];
  const combinedDeltas = scaleDeltasForDifficulty({...opt.deltas});
  if(mod && mod.extraDeltas){
    for(const k in mod.extraDeltas) combinedDeltas[k] = (combinedDeltas[k]||0) + mod.extraDeltas[k];
  }
  applyDeltasToObj(mpState.econState, combinedDeltas);
  if(Array.isArray(opt.sets)) opt.sets.forEach(f => { mpState.flags[f] = true; });
  mpState.timeline.push({...mpState.econState});
  mpState.history.push({
    type:'crisis', eyebrow:s.eyebrow, data:s.data, choice:opt.name, tag:opt.tag, note:opt.note,
    deltas:combinedDeltas, crossNote: mod ? mod.note : null,
    tally, totalVoters: votes.length, players: mpMeta.players.length
  });
  mpState.phase = 'reveal';
  mpState.revealData = { winner, tally, votedCount: votes.length, totalPlayers };

async function mpHostAdvance(){

function buildTimelineChart(){
  const metrics = [
    { key:'pib', label:'PIB', max:200, color:'var(--gold)' },
    { key:'desemprego', label:'Desemprego', max:100, color:'var(--crisis)' },
    { key:'inflacao', label:'Inflação', max:100, color:'var(--inflacao-c)' },
    { key:'confianca', label:'Confiança', max:100, color:'var(--growth)' },
    { key:'divida', label:'Dívida', max:250, color:'var(--divida-c)' },
    { key:'desigualdade', label:'Desigualdade', max:100, color:'var(--desig-c)' }
  ];
  const W = 620, H = 200, padL = 8, padR = 8, padT = 10, padB = 10;
  const n = timeline.length;
  const stepX = (W - padL - padR) / Math.max(1, n - 1);
  const toY = (val, max) => padT + (1 - clamp(val,0,max)/max) * (H - padT - padB);
  const lines = metrics.map(m => {
    const pts = timeline.map((pt, i) => `${(padL + i*stepX).toFixed(1)},${toY(pt[m.key], m.max).toFixed(1)}`).join(' ');
    return `<polyline points="${pts}" fill="none" stroke="${m.color}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" opacity="0.92"/>`;
  }).join('');
  const pointLabel = (i) => {
    if(i === 0) return 'Início do governo';
    const h = history[i-1];
    if(!h) return `Ponto ${i}`;
    return h.type === 'swan' ? `Evento: ${h.title}` : h.eyebrow;
  };
  const points = metrics.map(m => timeline.map((pt, i) => {
    const cx = (padL + i*stepX).toFixed(1);
    const cy = toY(pt[m.key], m.max).toFixed(1);
    const val = clamp(pt[m.key], -9999, 9999).toFixed(0);
    return `<circle cx="${cx}" cy="${cy}" r="6" fill="transparent" stroke="none" style="cursor:pointer"><title>${escapeHtml(pointLabel(i))} — ${m.label}: ${val}</title></circle>`;
  }).join('')).join('');
  const legend = metrics.map(m => `<span><i style="background:${m.color}"></i>${m.label}</span>`).join('');
  return `
  <div class="chart-wrap">
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
      <line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="rgba(42,36,28,0.25)" stroke-width="1"/>
      ${lines}
      ${points}
    </svg>
    <div class="chart-legend">${legend}</div>
  </div>`;
}
let currentEnding = null;
function shareResult(){
  const ending = currentEnding;
  if(!ending) return;
  const linhas = history.map((h,i) => h.type === 'swan' ? `${i+1}. [evento] ${h.title}` : `${i+1}. ${h.choice}`).join('\n');
  const texto = `Presidente por um Dia — meu governo terminou em: ${ending.title}\n`
    + `Modo: ${difficulty === 'dificil' ? 'Difícil' : 'Fácil'}\n\n`
    + `PIB: ${state.pib.toFixed(0)} · Desemprego: ${clamp(state.desemprego,0,100).toFixed(0)}% · Inflação: ${state.inflacao.toFixed(0)}%\n`
    + `Confiança: ${clamp(state.confianca,0,100).toFixed(0)}% · Dívida: ${clamp(state.divida,0,300).toFixed(0)}% · Desigualdade: ${clamp(state.desigualdade,0,100).toFixed(0)}%\n\n`
    + `Decisões tomadas:\n${linhas}`;
  const feedbackEl = document.getElementById('shareFeedback');
  if(navigator.share){
    navigator.share({ title:'Presidente por um Dia', text: texto }).catch(() => {});
    return;
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(texto).then(() => {
      if(feedbackEl) feedbackEl.textContent = 'Resultado copiado para a área de transferência!';
    }).catch(() => {
      if(feedbackEl) feedbackEl.textContent = 'Não foi possível copiar automaticamente.';
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = texto;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand('copy'); if(feedbackEl) feedbackEl.textContent = 'Resultado copiado para a área de transferência!'; }
    catch(e){ if(feedbackEl) feedbackEl.textContent = 'Não foi possível copiar automaticamente.'; }
    document.body.removeChild(ta);
  }
}
const PROGRESS_KEY = 'progressSummary';
async function updateProgressSummary(score, title, diffc){
  let summary = { gamesPlayed: 0, best: null };
  try{
    const raw = localStorage.getItem(PROGRESS_KEY);
    if(raw) summary = JSON.parse(raw);
  }catch(e){ /* sem histórico ainda */ }
  summary.gamesPlayed = (summary.gamesPlayed || 0) + 1;
  const isNewBest = !summary.best || score > summary.best.score;
  if(isNewBest){ summary.best = { score, title, difficulty: diffc, date: Date.now() }; }
  try{ localStorage.setItem(PROGRESS_KEY, JSON.stringify(summary)); }catch(e){ /* silencioso */ }
  return { ...summary, isNewBest };
}
async function getProgressSummary(){
  try{ const raw = localStorage.getItem(PROGRESS_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
async function renderFinal(){
  clearSoloProgress();
  const ending = getEnding();
  currentEnding = ending;
  playEndingSound(ending.good);
  const finalScore = computeScore();
  const progress = await updateProgressSummary(finalScore, ending.title, difficulty);
  const bars = [
    { key:'pib', label:'PIB', val: clamp(state.pib,0,200), max:200, good: state.pib >= 90 },
    { key:'desemprego', label:'Desemprego', val: clamp(state.desemprego,0,100), max:100, good: state.desemprego <= 15 },
    { key:'inflacao', label:'Inflação', val: clamp(state.inflacao,0,100), max:100, good: state.inflacao <= 10 },
    { key:'confianca', label:'Confiança popular', val: clamp(state.confianca,0,100), max:100, good: state.confianca >= 50 },
    { key:'divida', label:'Dívida pública', val: clamp(state.divida,0,250), max:250, good: state.divida <= 90 },
    { key:'desigualdade', label:'Desigualdade', val: clamp(state.desigualdade,0,100), max:100, good: state.desigualdade <= 45 }
  ];
  const barsHtml = bars.map(b => `
  <div class="bar-row">
    <div class="bar-label"><span>${b.label}</span><span>${b.val.toFixed(0)}</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${(b.val/b.max*100).toFixed(1)}%; background:${b.good ? 'var(--growth)' : 'var(--crisis)'}"></div></div>
  </div>`).join('');
  stage.innerHTML = `
  <div class="card">
    <span class="eyebrow">Veredito final</span>
    <div class="final-title">${ending.title}</div>
    <div class="final-sub">${ending.good ? 'Desfecho positivo' : 'Desfecho negativo'} · Modo ${difficulty === 'dificil' ? 'Difícil' : 'Fácil'}</div>
    <p class="final-desc">${ending.desc}</p>
    <div class="resume-banner">${progress.isNewBest
      ? `🏆 Novo recorde pessoal! Índice geral: ${finalScore.toFixed(0)}`
      : `Seu recorde: ${escapeHtml(progress.best.title)} (índice ${progress.best.score.toFixed(0)})`}
      · Partidas jogadas: ${progress.gamesPlayed}</div>
    ${buildTimelineChart()}
    ${barsHtml}
    <button class="btn primary" onclick="renderModeSelect()">Assumir o gabinete novamente</button>
    <button class="btn ghost" onclick="renderHistory()">Rever histórico de decisões</button>
    <button class="btn ghost" onclick="shareResult()">Compartilhar resultado</button>
    <div class="share-feedback" id="shareFeedback"></div>
  </div>`;
}

renderModeSelect();
</script>
